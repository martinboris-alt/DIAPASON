<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#080c12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#607080" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#607080" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0a0a0a"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="url(#glow)"/>

  <!-- Silhouette -->
  <g clip-path="url(#circle)" transform="translate(0, 10)">
    
    <ellipse cx="100" cy="68" rx="20" ry="23" fill="#607080" opacity="0.9"/>
    <path d="M74 108 Q76 90 82 84 Q91 78 100 78 Q109 78 118 84 Q124 90 126 108 Q115 118 100 120 Q85 118 74 108Z" fill="#607080" opacity="0.85"/>
    <path d="M64 122 Q68 108 74 108 Q85 118 100 120 Q115 118 126 108 Q132 108 136 122 Q126 146 100 150 Q74 146 64 122Z" fill="#607080" opacity="0.7"/>
    <ellipse cx="100" cy="68" rx="16" ry="11" fill="#080c12" opacity="0.35"/>
  
  </g>

  <!-- Decorative rings -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#607080" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#607080" stroke-width="1" opacity="0.5"/>

  <!-- Corner accents -->
  <path d="M14 14 L30 14 M14 14 L14 30" stroke="#607080" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M186 14 L170 14 M186 14 L186 30" stroke="#607080" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M14 186 L30 186 M14 186 L14 170" stroke="#607080" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M186 186 L170 186 M186 186 L186 170" stroke="#607080" stroke-width="1.5" opacity="0.6" fill="none"/>

  <!-- Initials -->
  <text x="100" y="192" font-family="Georgia, serif" font-size="11" fill="#607080"
    opacity="0.7" text-anchor="middle" letter-spacing="4">HS</text>
</svg>