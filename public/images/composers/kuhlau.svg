<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#080c14" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#607890" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#607890" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0a0a0a"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="url(#glow)"/>

  <!-- Silhouette -->
  <g clip-path="url(#circle)" transform="translate(0, 10)">
    
    <ellipse cx="100" cy="70" rx="20" ry="24" fill="#607890" opacity="0.9"/>
    <path d="M72 112 Q75 92 80 86 Q90 80 100 80 Q110 80 120 86 Q125 92 128 112 Q116 122 100 124 Q84 122 72 112Z" fill="#607890" opacity="0.85"/>
    <path d="M65 125 Q68 112 72 112 Q84 122 100 124 Q116 122 128 112 Q132 112 135 125 Q125 148 100 152 Q75 148 65 125Z" fill="#607890" opacity="0.7"/>
    <ellipse cx="100" cy="70" rx="16" ry="12" fill="#080c14" opacity="0.3"/>
  
  </g>

  <!-- Decorative rings -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#607890" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#607890" stroke-width="1" opacity="0.5"/>

  <!-- Corner accents -->
  <path d="M14 14 L30 14 M14 14 L14 30" stroke="#607890" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M186 14 L170 14 M186 14 L186 30" stroke="#607890" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M14 186 L30 186 M14 186 L14 170" stroke="#607890" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M186 186 L170 186 M186 186 L186 170" stroke="#607890" stroke-width="1.5" opacity="0.6" fill="none"/>

  <!-- Initials -->
  <text x="100" y="192" font-family="Georgia, serif" font-size="11" fill="#607890"
    opacity="0.7" text-anchor="middle" letter-spacing="4">FK</text>
</svg>