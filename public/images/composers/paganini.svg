<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#180600" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A04030" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A04030" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0a0a0a"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="url(#glow)"/>

  <!-- Silhouette -->
  <g clip-path="url(#circle)" transform="translate(0, 10)">
    
    <ellipse cx="100" cy="72" rx="21" ry="25" fill="#A04030" opacity="0.9"/>
    <path d="M70 115 Q73 93 79 87 Q89 81 100 81 Q111 81 121 87 Q127 93 130 115 Q118 124 100 126 Q82 124 70 115Z" fill="#A04030" opacity="0.85"/>
    <path d="M58 128 Q63 114 70 115 Q82 124 100 126 Q118 124 130 115 Q137 114 142 128 Q132 152 100 156 Q68 152 58 128Z" fill="#A04030" opacity="0.7"/>
    <ellipse cx="100" cy="72" rx="17" ry="13" fill="#180600" opacity="0.3"/>
    <path d="M79 65 Q85 55 100 53 Q115 55 121 65" fill="none" stroke="#A04030" stroke-width="1" opacity="0.5"/>
  
  </g>

  <!-- Decorative rings -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#A04030" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#A04030" stroke-width="1" opacity="0.5"/>

  <!-- Corner accents -->
  <path d="M14 14 L30 14 M14 14 L14 30" stroke="#A04030" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M186 14 L170 14 M186 14 L186 30" stroke="#A04030" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M14 186 L30 186 M14 186 L14 170" stroke="#A04030" stroke-width="1.5" opacity="0.6" fill="none"/>
  <path d="M186 186 L170 186 M186 186 L186 170" stroke="#A04030" stroke-width="1.5" opacity="0.6" fill="none"/>

  <!-- Initials -->
  <text x="100" y="192" font-family="Georgia, serif" font-size="11" fill="#A04030"
    opacity="0.7" text-anchor="middle" letter-spacing="4">NP</text>
</svg>