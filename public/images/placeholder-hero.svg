<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="keys" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Piano keys pattern -->
  <g opacity="0.15">
    <!-- White keys -->
    <rect x="200" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="256" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="312" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="368" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="424" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="480" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="536" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="592" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="648" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="704" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="760" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="816" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="872" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <rect x="928" y="400" width="48" height="280" rx="2" fill="#e8e0d0" stroke="#444" stroke-width="1"/>
    <!-- Black keys -->
    <rect x="232" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="288" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="400" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="456" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="512" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="624" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="680" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="792" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="848" y="400" width="32" height="180" rx="2" fill="#111"/>
    <rect x="904" y="400" width="32" height="180" rx="2" fill="#111"/>
  </g>
  <!-- Gold accent line -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#C9A84C" stroke-width="1" opacity="0.1"/>
  <!-- Text -->
  <text x="960" y="260" font-family="Georgia, serif" font-size="64" fill="#C9A84C" opacity="0.4" text-anchor="middle" font-style="italic">Diapasón</text>
  <text x="960" y="320" font-family="Arial, sans-serif" font-size="16" fill="#C9A84C" opacity="0.3" text-anchor="middle" letter-spacing="8">AFINACIÓN DE PIANOS</text>
  <!-- Placeholder notice -->
  <text x="960" y="860" font-family="Arial, sans-serif" font-size="18" fill="#C9A84C" opacity="0.5" text-anchor="middle">[ Reemplazar con foto hero del piano ]</text>
</svg>
